name: Get Player Data

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: get-player-data-main
  cancel-in-progress: false

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parser, database and web tests
        run: |
          python -m unittest discover -s tests -v

      - name: Restore the previous database release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python tools/fetch_db_from_release.py --optional --out data/db/ratings.sqlite

      - name: Repair corrupted names in the restored database
        run: |
          python tools/profile_name_guard.py repair-db \
            --db data/db/ratings.sqlite \
            --optional

      - name: Collect known players and probe new IDs
        env:
          COOKIES_JSON: ${{ secrets.COOKIES_JSON }}
          DB_PATH: data/db/ratings.sqlite
          MIN_BASELINE_SUCCESS_RATIO: "0.995"
          COLLECT_RETRIES: "3"
          COLLECT_CONCURRENCY: "10"
          NEW_PLAYER_PROBE_COUNT: "300"
        run: |
          python get_data.py --db-path data/db/ratings.sqlite

      - name: Locate collection files
        id: collection
        shell: bash
        run: |
          snapshot="$(find data -maxdepth 1 -type f -name 'heroes_*.json.gz' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
          metadata="${snapshot%.json.gz}.meta.json"
          echo "snapshot=$snapshot" >> "$GITHUB_OUTPUT"
          echo "metadata=$metadata" >> "$GITHUB_OUTPUT"

      - name: Validate collected player names
        run: |
          python tools/profile_name_guard.py validate-snapshot \
            --snapshot "${{ steps.collection.outputs.snapshot }}"

      - name: Back up the raw collection for seven days
        uses: actions/upload-artifact@v4
        with:
          name: latest-collection-${{ github.run_id }}
          path: |
            ${{ steps.collection.outputs.snapshot }}
            ${{ steps.collection.outputs.metadata }}
          retention-days: 7
          if-no-files-found: error

      - name: Incrementally update SQLite
        run: |
          python tools/build_db.py \
            --data-dir data \
            --db-path data/db/ratings.sqlite \
            --best-window-days 30 \
            --max-gap-hours 26

      - name: Compress and validate SQLite
        run: |
          python tools/compress_db.py \
            --db data/db/ratings.sqlite \
            --out data/db/ratings.sqlite.gz

      - name: Publish the database in GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: db-latest
          name: Database (latest)
          allowUpdates: true
          replacesArtifacts: true
          artifacts: data/db/ratings.sqlite.gz

      - name: Trigger Render only after the release is ready
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set; skipping Render deploy."
            exit 0
          fi
          curl --fail --silent --show-error --retry 3 --retry-delay 5 \
            -X GET "$RENDER_DEPLOY_HOOK_URL"
